<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аудит структуры сайта · TriDaVii</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#030810;--blue:#38bdf8;--teal:#2dd4bf;--purple:#a78bfa;
  --green:#34d399;--gold:#fbbf24;--red:#f87171;
  --text:#e2e8f0;--muted:#94a3b8;--card:#0d1a2d;
  --bdr:rgba(56,189,248,.1);
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
  height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}

.hdr{flex-shrink:0;background:rgba(3,8,16,.95);border-bottom:1px solid var(--bdr);
  backdrop-filter:blur(12px);padding:0 14px;display:flex;align-items:center;
  gap:14px;height:50px;min-width:0}
.brand{font-family:'DM Mono',monospace;font-size:11px;color:var(--blue);
  white-space:nowrap;letter-spacing:.04em;flex-shrink:0}

.tabs{display:flex;gap:3px;flex:1;min-width:0;overflow:hidden}
.tab{padding:4px 9px;border-radius:6px;border:1px solid var(--bdr);background:transparent;
  color:var(--muted);font-family:'DM Sans',sans-serif;font-size:10.5px;cursor:pointer;
  transition:all .18s;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--text);border-color:rgba(56,189,248,.22)}
.tab.active{background:rgba(56,189,248,.1);color:var(--blue);border-color:rgba(56,189,248,.38)}

.legend{display:flex;gap:10px;align-items:center;flex-shrink:0}
.li{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--muted);white-space:nowrap}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ld.platform{background:var(--blue)}.ld.analytic{background:var(--teal)}
.ld.crm{background:var(--purple)}.ld.exists{background:var(--green)}
.ld.manual{background:var(--gold)}.ld.missing{background:var(--red)}

.tog{display:flex;background:rgba(255,255,255,.04);border:1px solid var(--bdr);
  border-radius:7px;padding:3px;gap:2px;flex-shrink:0}
.tbtn{padding:3px 11px;border-radius:5px;border:none;background:transparent;
  color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .18s}
.tbtn.active{background:rgba(56,189,248,.14);color:var(--blue)}
.tbtn.af.active{background:rgba(52,211,153,.12);color:var(--green)}

.cwrap{flex:1;position:relative;overflow:hidden;cursor:grab}
.cwrap:active{cursor:grabbing}
.canvas{position:absolute;top:0;left:0;width:1200px;height:540px;transform-origin:0 0}
.esvg{position:absolute;top:0;left:0;width:1200px;height:540px;pointer-events:none;overflow:visible}

.node{position:absolute;width:160px;border-radius:8px;padding:9px 11px;
  cursor:move;border:1.5px solid;background:var(--card);transition:box-shadow .15s;z-index:1}
.node:hover{z-index:5}
.node.drag{z-index:100;box-shadow:0 8px 30px rgba(0,0,0,.55)}
.node-platform{border-color:var(--blue)}
.node-analytic{border-color:var(--teal)}
.node-crm{border-color:var(--purple);background:rgba(167,139,250,.05)}
.node-exists{border-color:var(--green)}
.node-manual{border-color:var(--gold)}
.node-missing{border-color:var(--red)}
.nlb{font-size:11.5px;font-weight:600;color:var(--text);line-height:1.3}
.nsb{font-size:9.5px;color:var(--muted);margin-top:2px;font-family:'DM Mono',monospace;line-height:1.35}
.node-platform .nlb{color:var(--blue)}
.node-crm .nlb{color:var(--purple)}
.node-analytic .nlb{color:var(--teal)}

.fitbtn{position:absolute;bottom:14px;right:14px;background:rgba(13,26,45,.95);
  border:1px solid var(--bdr);color:var(--muted);font-family:'DM Mono',monospace;
  font-size:10.5px;padding:5px 11px;border-radius:6px;cursor:pointer;z-index:50;transition:all .18s}
.fitbtn:hover{color:var(--blue);border-color:rgba(56,189,248,.3)}
.zinfo{position:absolute;bottom:14px;right:110px;font-family:'DM Mono',monospace;
  font-size:10px;color:var(--muted);z-index:50;pointer-events:none}
</style>
</head>

<div class="hdr">
  <div class="brand">TriDaVii · Аудит</div>

  <div class="tog">

<div class="cwrap" id="cwrap">

  <button class="fitbtn" onclick="fit()">По экрану ⊡</button>

</div>

function init(){
  const row=document.getElementById('tabs');
  T.forEach((t,i)=>{
    const b=document.createElement('button');
    b.className='tab'+(i===0?' active':'');
    b.textContent=(i+1)+' · '+t.name;
    b.onclick=()=>switchT(i);
    row.appendChild(b);
  });
  load(0,'before');
  bindPan();
  bindZoom();
  requestAnimationFrame(fit);
}

function switchT(i){
  curT=i;
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  load(i,curP);
}

function setPhase(p){
  curP=p;
  document.getElementById('bb').classList.toggle('active',p==='before');
  document.getElementById('ba').classList.toggle('active',p==='after');
  load(curT,p);
}

function load(ti,ph){
  curData=T[ti][ph];
  pos={};
  curData.nodes.forEach(n=>{pos[n.id]={x:n.x,y:n.y};});
  renderNodes();
  requestAnimationFrame(renderEdges);
}

function renderNodes(){
  const cv=document.getElementById('canvas');
  cv.querySelectorAll('.node').forEach(n=>n.remove());
  curData.nodes.forEach(nd=>{
    const el=document.createElement('div');
    el.className='node node-'+nd.tp;
    el.dataset.id=nd.id;
    el.style.left=pos[nd.id].x+'px';
    el.style.top=pos[nd.id].y+'px';
    el.innerHTML='<div class="nlb">'+nd.lb+'</div><div class="nsb">'+nd.sb+'</div>';
    makeDrag(el);
    cv.appendChild(el);
  });
}

function renderEdges(){
  const svg=document.getElementById('esvg');
  svg.innerHTML='';
  curData.edges.forEach(([a,b])=>drawEdge(svg,a,b));
}

function nodeH(id){
  const el=document.querySelector('.node[data-id="'+id+'"]');
  return el?el.offsetHeight:50;
}

function drawEdge(svg,a,b){
  const pa=pos[a],pb=pos[b];
  if(!pa||!pb)return;
  const x1=pa.x+NW/2,y1=pa.y+nodeH(a);
  const x2=pb.x+NW/2,y2=pb.y;
  const cp=Math.max(18,(y2-y1)*0.55);
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d','M'+x1+','+y1+' C'+x1+','+(y1+cp)+' '+x2+','+(y2-cp)+' '+x2+','+y2);
  p.setAttribute('stroke','rgba(56,189,248,0.28)');
  p.setAttribute('stroke-width','1.5');
  p.setAttribute('fill','none');
  p.dataset.a=a; p.dataset.b=b;
  svg.appendChild(p);
}

function updateEdges(id){
  document.querySelectorAll('path[data-a="'+id+'"],path[data-b="'+id+'"]').forEach(p=>{
    const a=p.dataset.a,b=p.dataset.b;
    const pa=pos[a],pb=pos[b];
    if(!pa||!pb)return;
    const x1=pa.x+NW/2,y1=pa.y+nodeH(a),x2=pb.x+NW/2,y2=pb.y;
    const cp=Math.max(18,(y2-y1)*0.55);
    p.setAttribute('d','M'+x1+','+y1+' C'+x1+','+(y1+cp)+' '+x2+','+(y2-cp)+' '+x2+','+y2);
  });
}

function makeDrag(el){
  let sx,sy,ox,oy;
  el.addEventListener('pointerdown',e=>{
    e.stopPropagation();
    el.setPointerCapture(e.pointerId);
    el.classList.add('drag');
    sx=e.clientX;sy=e.clientY;
    ox=pos[el.dataset.id].x;oy=pos[el.dataset.id].y;
    const mv=ev=>{
      const nx=ox+(ev.clientX-sx)/sc,ny=oy+(ev.clientY-sy)/sc;
      pos[el.dataset.id]={x:nx,y:ny};
      el.style.left=nx+'px';el.style.top=ny+'px';
      updateEdges(el.dataset.id);
    };
    const up=()=>{el.classList.remove('drag');el.removeEventListener('pointermove',mv);el.removeEventListener('pointerup',up);};
    el.addEventListener('pointermove',mv);el.addEventListener('pointerup',up);
  });
}

function bindPan(){
  const w=document.getElementById('cwrap');
  let pan=false,px0=0,py0=0,tx0=0,ty0=0;
  w.addEventListener('pointerdown',e=>{
    if(e.target.closest('.node,.fitbtn'))return;
    pan=true;w.setPointerCapture(e.pointerId);
    px0=e.clientX;py0=e.clientY;tx0=tx;ty0=ty;
  });
  w.addEventListener('pointermove',e=>{
    if(!pan)return;
    tx=tx0+(e.clientX-px0);ty=ty0+(e.clientY-py0);applyT();
  });
  w.addEventListener('pointerup',()=>{pan=false;});
}

function bindZoom(){
  const w=document.getElementById('cwrap');
  w.addEventListener('wheel',e=>{
    e.preventDefault();
    const r=w.getBoundingClientRect();
    const mx=e.clientX-r.left,my=e.clientY-r.top;
    const d=e.deltaY<0?1.09:0.92;
    const ns=Math.min(MAX_Z,Math.max(MIN_Z,sc*d));
    const k=ns/sc;tx=mx-k*(mx-tx);ty=my-k*(my-ty);sc=ns;applyT();
  },{passive:false});
}

function applyT(){
  document.getElementById('canvas').style.transform='translate('+tx+'px,'+ty+'px) scale('+sc+')';
  document.getElementById('zinfo').textContent=Math.round(sc*100)+'%';
}

function fit(){
  const w=document.getElementById('cwrap');
  sc=Math.min(MAX_Z,Math.max(MIN_Z,Math.min(w.clientWidth/1160,w.clientHeight/520)*0.92));
  tx=(w.clientWidth-1160*sc)/2;ty=(w.clientHeight-520*sc)/2;applyT();
}

window.addEventListener('DOMContentLoaded',init);
</script>
