<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Аудит · Было / Стало</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#030810;--blue:#38bdf8;--green:#34d399;--gold:#fbbf24;--red:#f87171;
  --text:#e2eeff;--mid:#7a9cbf;--dim:#2a405a;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:var(--sans);user-select:none;-webkit-font-smoothing:antialiased}

/* ── HEADER ─────────────────────────────── */
#hdr{
  position:fixed;top:0;left:0;right:0;height:48px;z-index:200;
  display:flex;align-items:center;gap:14px;padding:0 20px;
  background:rgba(3,8,16,.95);border-bottom:1px solid rgba(56,189,248,.1);
  backdrop-filter:blur(14px);
}
#hdr-title{
  font-family:var(--mono);font-size:10px;letter-spacing:.15em;
  color:var(--blue);text-transform:uppercase;white-space:nowrap;flex-shrink:0
}
#hdr-toggle{
  display:flex;gap:3px;flex-shrink:0;
  background:rgba(56,189,248,.05);border:1px solid rgba(56,189,248,.1);
  border-radius:7px;padding:3px;
}
.htbtn{
  padding:4px 14px;border-radius:4px;
  font-family:var(--mono);font-size:8px;letter-spacing:.12em;text-transform:uppercase;
  border:none;background:transparent;color:var(--dim);cursor:pointer;transition:all .2s;
}
.htbtn.ab{background:rgba(248,113,113,.15);color:#f87171}
.htbtn.aa{background:rgba(52,211,153,.12); color:#34d399}
#hdr-hint{
  font-family:var(--mono);font-size:8px;color:var(--dim);
  letter-spacing:.09em;white-space:nowrap;flex-shrink:0;
}
#hdr-legend{
  display:flex;align-items:center;gap:12px;margin-left:auto;
  font-family:var(--mono);font-size:8px;letter-spacing:.09em;color:var(--dim);flex-shrink:0;
}
.leg{display:flex;align-items:center;gap:5px}
.ld{width:7px;height:7px;border-radius:50%}

/* ── VIEWPORT ───────────────────────────── */
#vp{
  position:fixed;top:48px;left:0;right:0;bottom:0;
  overflow:hidden;cursor:grab;
}
#vp.grabbing{cursor:grabbing}
#cv{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
#svg{position:absolute;top:0;left:0;overflow:visible;pointer-events:none;z-index:0}

/* ── NODE ───────────────────────────────── */
.node{
  position:absolute;width:440px;
  border-radius:11px;overflow:hidden;
  background:rgba(5,12,26,.97);
  border:1px solid rgba(56,189,248,.16);
  box-shadow:0 8px 36px rgba(0,0,0,.6);
  transition:border-color .2s,box-shadow .2s;z-index:1;
}
.node:hover{
  border-color:rgba(56,189,248,.38);
  box-shadow:0 8px 40px rgba(0,0,0,.75),0 0 20px rgba(56,189,248,.06);
}
.nh{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 11px;gap:8px;
  background:rgba(56,189,248,.04);
  border-bottom:1px solid rgba(56,189,248,.08);
  cursor:grab;
}
.nh:active{cursor:grabbing}
.nm{min-width:0}
.ns{font-family:var(--mono);font-size:8px;letter-spacing:.13em;color:var(--dim);text-transform:uppercase}
.nn{font-family:var(--sans);font-size:11px;font-weight:600;color:var(--text);
  margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ntgl{display:flex;gap:3px;flex-shrink:0}
.nb,.na{
  padding:3px 9px;border-radius:4px;
  font-family:var(--mono);font-size:7px;letter-spacing:.1em;text-transform:uppercase;
  border:1px solid rgba(56,189,248,.12);background:transparent;
  color:var(--dim);cursor:pointer;transition:all .18s;
}
.nb.on{background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.38);color:#f87171}
.na.on{background:rgba(52,211,153,.1); border-color:rgba(52,211,153,.38); color:#34d399}
.mbadge{
  position:absolute;top:44px;right:9px;
  font-family:var(--mono);font-size:7px;letter-spacing:.1em;text-transform:uppercase;
  padding:2px 7px;border-radius:10px;pointer-events:none;z-index:2;
}
.mbadge.b{background:rgba(248,113,113,.15);color:#f87171;border:1px solid rgba(248,113,113,.28)}
.mbadge.a{background:rgba(52,211,153,.12); color:#34d399; border:1px solid rgba(52,211,153,.28)}
.ni-wrap{line-height:0}
.ni{width:100%;height:auto;display:block;pointer-events:none;
  transition:opacity .28s;opacity:1}
.ni.dim{opacity:.15}

/* ── CONTROLS ───────────────────────────── */
#ctrl{position:fixed;bottom:14px;right:14px;display:flex;align-items:center;gap:5px;z-index:300}
.cb{
  height:30px;min-width:30px;padding:0 10px;border-radius:7px;
  background:rgba(5,12,26,.94);border:1px solid rgba(56,189,248,.16);
  color:var(--mid);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .18s;font-family:var(--mono);
}
.cb:hover{border-color:rgba(56,189,248,.45);color:var(--blue)}
#zl{font-family:var(--mono);font-size:8px;color:var(--dim);
  letter-spacing:.08em;min-width:34px;text-align:center}
</style>
</head>
<body>

<div id="hdr">
  <div id="hdr-title">TriDaVii · Аудит сайта</div>
  <div id="hdr-toggle">
    <button class="htbtn ab" id="btn-b">КАК СЕЙЧАС</button>
    <button class="htbtn"    id="btn-a">С НАМИ</button>
  </div>
  <div id="hdr-hint">тащите карточку · колесо — зум</div>
  <div id="hdr-legend">
    <div class="leg"><div class="ld" style="background:#4ade80"></div>есть</div>
    <div class="leg"><div class="ld" style="background:#fbbf24"></div>вручную</div>
    <div class="leg"><div class="ld" style="background:#f87171"></div>нет</div>
  </div>
</div>

<div id="vp">
  <div id="cv">
    <svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<div id="ctrl">
  <button class="cb" id="fit" style="font-size:9px;letter-spacing:.08em">По экрану</button>
  <button class="cb" id="zo">−</button>
  <span id="zl">100%</span>
  <button class="cb" id="zi">+</button>
</div>

<script>
'use strict';

const CW = 440, MIN_Z = 0.4, MAX_Z = 1.25;
const CGX = 498, CGY = 388; // col/row gap

const CARDS = [
  {id:'t1',sub:'Шаблон 1',name:'Голая Тильда',     c:0,r:0,
   b:'cards/t1_golaya_tilda_before.png',   a:'cards/t1_golaya_tilda_after.png'},
  {id:'t2',sub:'Шаблон 2',name:'Тильда + JivoSite',c:1,r:0,
   b:'cards/t2_tilda_jivo_before.png',     a:'cards/t2_tilda_jivo_after.png'},
  {id:'t3',sub:'Шаблон 3',name:'Тильда + YClients',c:2,r:0,
   b:'cards/t3_tilda_yclients_before.png', a:'cards/t3_tilda_yclients_after.png'},
  {id:'t4',sub:'Шаблон 4',name:'WordPress',         c:3,r:0,
   b:'cards/t4_wordpress_before.png',      a:'cards/t4_wordpress_after.png'},
  {id:'t5',sub:'Шаблон 5',name:'Лендинг',          c:0,r:1,
   b:'cards/t5_lending_before.png',        a:'cards/t5_lending_after.png'},
  {id:'t6',sub:'Шаблон 6',name:'AmoCRM',            c:1,r:1,
   b:'cards/t6_amocrm_before.png',         a:'cards/t6_amocrm_after.png'},
  {id:'t7',sub:'Шаблон 7',name:'Только соцсети',   c:2,r:1,
   b:'cards/t7_social_only_before.png',    a:'cards/t7_social_only_after.png'},
  {id:'t8',sub:'Шаблон 8',name:'Тильда + DiKiDi',  c:3,r:1,
   b:'cards/t8_dikidi_before.png',         a:'cards/t8_dikidi_after.png'},
];

const EDGES = [
  ['t1','t2'],['t2','t3'],['t3','t4'],
  ['t5','t6'],['t6','t7'],['t7','t8'],
  ['t1','t5'],['t2','t6'],['t3','t7'],['t4','t8'],
];

const S = {
  tx:0,ty:0,tz:1,
  ns:{},           // id → {x,y,mode,el}
  pan:false,px:0,py:0,
  drag:null,dx:0,dy:0,
};

CARDS.forEach(c=>{
  S.ns[c.id]={x:60+c.c*CGX, y:60+c.r*CGY, mode:'before', el:null};
});

const vp  = document.getElementById('vp');
const cv  = document.getElementById('cv');
const svg = document.getElementById('svg');

// ── BUILD NODES ────────────────────────────
CARDS.forEach(c=>{
  const ns=S.ns[c.id];
  const d=document.createElement('div');
  d.className='node'; d.id='n-'+c.id;
  d.style.left=ns.x+'px'; d.style.top=ns.y+'px';
  d.innerHTML=`
    <div class="nh" data-id="${c.id}">
      <div class="nm">
        <div class="ns">${c.sub}</div>
        <div class="nn">${c.name}</div>
      </div>
      <div class="ntgl">
        <button class="nb on" data-id="${c.id}">ДО</button>
        <button class="na"    data-id="${c.id}">ПОСЛЕ</button>
      </div>
    </div>
    <span class="mbadge b" data-id="${c.id}">КАК СЕЙЧАС</span>
    <div class="ni-wrap">
      <img class="ni dim" src="${c.b}" data-b="${c.b}" data-a="${c.a}" alt="${c.name}">
    </div>`;
  cv.appendChild(d);
  ns.el=d;

  const img=d.querySelector('.ni');
  img.addEventListener('load',  ()=>{ img.classList.remove('dim'); drawLines(); });
  img.addEventListener('error', ()=>  img.classList.remove('dim'));

  d.querySelector('.nb').addEventListener('click',e=>{e.stopPropagation();setMode(c.id,'before');});
  d.querySelector('.na').addEventListener('click',e=>{e.stopPropagation();setMode(c.id,'after');});

  d.querySelector('.nh').addEventListener('mousedown',e=>{
    if(e.target.tagName==='BUTTON')return;
    e.stopPropagation();
    const r=d.getBoundingClientRect();
    S.drag=c.id; S.dx=(e.clientX-r.left)/S.tz; S.dy=(e.clientY-r.top)/S.tz;
    d.style.zIndex='20'; d.style.transition='none';
  });
});

// ── SET MODE ───────────────────────────────
function setMode(id,mode){
  const ns=S.ns[id], d=ns.el, c=CARDS.find(x=>x.id===id);
  ns.mode=mode;
  const img=d.querySelector('.ni');
  img.classList.add('dim');
  img.src=mode==='before'?c.b:c.a;
  d.querySelector('.nb').className='nb'+(mode==='before'?' on':'');
  d.querySelector('.na').className='na'+(mode==='after' ?' on':'');
  const mb=d.querySelector('.mbadge');
  mb.className='mbadge '+(mode==='before'?'b':'a');
  mb.textContent=mode==='before'?'КАК СЕЙЧАС':'С НАМИ';
}

// ── GLOBAL TOGGLE ──────────────────────────
document.getElementById('btn-b').addEventListener('click',()=>{
  document.getElementById('btn-b').className='htbtn ab';
  document.getElementById('btn-a').className='htbtn';
  CARDS.forEach(c=>setMode(c.id,'before'));
});
document.getElementById('btn-a').addEventListener('click',()=>{
  document.getElementById('btn-a').className='htbtn aa';
  document.getElementById('btn-b').className='htbtn';
  CARDS.forEach(c=>setMode(c.id,'after'));
});

// ── DRAW CONNECTIONS ───────────────────────
function nH(id){ return (S.ns[id].el||{}).offsetHeight||310; }

function drawLines(){
  svg.innerHTML='';
  const defs=svg.appendChild(document.createElementNS('http://www.w3.org/2000/svg','defs'));
  const mk=defs.appendChild(document.createElementNS('http://www.w3.org/2000/svg','marker'));
  mk.setAttribute('id','ar');mk.setAttribute('markerWidth','7');mk.setAttribute('markerHeight','7');
  mk.setAttribute('refX','6');mk.setAttribute('refY','3.5');mk.setAttribute('orient','auto');
  const p=mk.appendChild(document.createElementNS('http://www.w3.org/2000/svg','polygon'));
  p.setAttribute('points','0 0,7 3.5,0 7');p.setAttribute('fill','rgba(56,189,248,.28)');

  EDGES.forEach(([aid,bid])=>{
    const a=S.ns[aid],b=S.ns[bid],ah=nH(aid),bh=nH(bid);
    const dx=b.x-a.x, dy=b.y-a.y;
    let x1,y1,x2,y2,cx1,cy1,cx2,cy2;
    if(Math.abs(dx)>=Math.abs(dy)){
      if(dx>=0){x1=a.x+CW;y1=a.y+ah/2;x2=b.x;y2=b.y+bh/2;}
      else      {x1=a.x;   y1=a.y+ah/2;x2=b.x+CW;y2=b.y+bh/2;}
      const d2=Math.abs(x2-x1)*0.42;
      cx1=x1+(dx>=0?d2:-d2);cy1=y1;cx2=x2+(dx>=0?-d2:d2);cy2=y2;
    } else {
      if(dy>=0){x1=a.x+CW/2;y1=a.y+ah;x2=b.x+CW/2;y2=b.y;}
      else      {x1=a.x+CW/2;y1=a.y;   x2=b.x+CW/2;y2=b.y+bh;}
      const d2=Math.abs(y2-y1)*0.42;
      cx1=x1;cy1=y1+(dy>=0?d2:-d2);cx2=x2;cy2=y2+(dy>=0?-d2:d2);
    }
    const path=svg.appendChild(document.createElementNS('http://www.w3.org/2000/svg','path'));
    path.setAttribute('d',`M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke','rgba(56,189,248,.18)');
    path.setAttribute('stroke-width','1.5');
    path.setAttribute('stroke-dasharray','6,4');
    path.setAttribute('marker-end','url(#ar)');
  });
}

// ── TRANSFORM ──────────────────────────────
function applyT(){
  cv.style.transform=`translate(${S.tx}px,${S.ty}px) scale(${S.tz})`;
  document.getElementById('zl').textContent=Math.round(S.tz*100)+'%';
}

function fitAll(){
  const vw=vp.clientWidth, vh=vp.clientHeight;
  let mx=Infinity,my=Infinity,Mx=-Infinity,My=-Infinity;
  CARDS.forEach(c=>{
    const ns=S.ns[c.id],h=nH(c.id);
    mx=Math.min(mx,ns.x);my=Math.min(my,ns.y);
    Mx=Math.max(Mx,ns.x+CW);My=Math.max(My,ns.y+h);
  });
  const cw=Mx-mx,ch=My-my,pad=56;
  const z=Math.min(MAX_Z,Math.max(MIN_Z,Math.min((vw-pad*2)/cw,(vh-pad*2)/ch)));
  S.tz=z; S.tx=(vw-cw*z)/2-mx*z; S.ty=(vh-ch*z)/2-my*z;
  applyT();
}

// ── MOUSE ──────────────────────────────────
vp.addEventListener('mousedown',e=>{
  if(e.button||e.target.closest('.node'))return;
  S.pan=true;S.px=e.clientX-S.tx;S.py=e.clientY-S.ty;
  vp.classList.add('grabbing');
});
window.addEventListener('mousemove',e=>{
  if(S.pan){S.tx=e.clientX-S.px;S.ty=e.clientY-S.py;applyT();return;}
  if(S.drag){
    const ns=S.ns[S.drag],vr=vp.getBoundingClientRect();
    ns.x=(e.clientX-vr.left-S.tx)/S.tz-S.dx;
    ns.y=(e.clientY-vr.top -S.ty)/S.tz-S.dy;
    ns.el.style.left=ns.x+'px';ns.el.style.top=ns.y+'px';
    drawLines();
  }
});
window.addEventListener('mouseup',()=>{
  if(S.drag){const ns=S.ns[S.drag];ns.el.style.zIndex='';ns.el.style.transition='';}
  S.pan=false;S.drag=null;vp.classList.remove('grabbing');
});

// ── ZOOM ───────────────────────────────────
function zoomAt(delta,cx,cy){
  const nz=Math.min(MAX_Z,Math.max(MIN_Z,S.tz+delta));
  if(nz===S.tz)return;
  S.tx=cx-(cx-S.tx)*(nz/S.tz);S.ty=cy-(cy-S.ty)*(nz/S.tz);S.tz=nz;applyT();
}
vp.addEventListener('wheel',e=>{
  e.preventDefault();
  const vr=vp.getBoundingClientRect();
  zoomAt(e.deltaY<0?0.07:-0.07,e.clientX-vr.left,e.clientY-vr.top);
},{passive:false});
document.getElementById('zi').addEventListener('click',()=>zoomAt(0.1,vp.clientWidth/2,vp.clientHeight/2));
document.getElementById('zo').addEventListener('click',()=>zoomAt(-0.1,vp.clientWidth/2,vp.clientHeight/2));
document.getElementById('fit').addEventListener('click',fitAll);

// ── TOUCH ──────────────────────────────────
let tp=null;
vp.addEventListener('touchstart',e=>{if(e.touches.length===1){const t=e.touches[0];tp={x:t.clientX,y:t.clientY};}},{passive:true});
vp.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1&&tp){const t=e.touches[0];S.tx+=t.clientX-tp.x;S.ty+=t.clientY-tp.y;tp={x:t.clientX,y:t.clientY};applyT();}},{passive:false});
vp.addEventListener('touchend',()=>{tp=null;},{passive:true});

// ── INIT ───────────────────────────────────
drawLines();
setTimeout(fitAll,150);
</script>
</body>
</html>
